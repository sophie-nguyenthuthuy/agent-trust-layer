name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,langgraph]"
      - name: tests
        run: pytest -q
      - name: example demos (smoke)
        run: |
          python examples/multi_agent_demo.py
          python examples/langgraph_agent.py
          python examples/vn_governance_demo.py
      - name: eval harness (smoke + asserts the layer helps)
        run: |
          python -m eval.harness --n 400 --json results.json
          python - <<'PY'
          import json
          r = json.load(open("results.json"))
          off, on = r["off"], r["on"]
          assert on["tool_misuse_rate"] == 0.0, on
          assert on["hallucination_rate"] < off["hallucination_rate"], (off, on)
          assert on["over_block_rate"] == 0.0, on
          assert r["provenance_chain_intact"] is True
          # latency overhead must stay negligible
          assert on["latency_p95_ms"] <= off["latency_p95_ms"] * 1.05, (off, on)
          print("eval gate OK:", on)
          PY
